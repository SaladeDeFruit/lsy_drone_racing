# Level 0 — attitude control variant (racing_attitude_mpc.py)
# Same track as level0.toml, but the environment runs in "attitude" control mode so the MPC
# commands [roll, pitch, yaw, collective_thrust] directly (enables roll control through gates).

[controller]
file = "racing_attitude_mpc.py"

[deploy]
check_race_track = true
check_drone_start_pos = true
real_track_objects = true

[[deploy.drones]]
id = 10
channel = 100
drone_model = "cf2x_P250"

[sim]
physics = "first_principles"
drone_model = "cf2x_P250"
freq = 500
attitude_freq = 500
render = true
camera = -1
[[sim.cam_config]]
distance = 5.0
azimuth = 180.0
elevation = -25.0
lookat = [0.0, 0.0, 0.0]

[env]
id = "DroneRacing-v0"
seed = -1
freq = 50
sensor_range = 0.7
control_mode = "attitude"   # <-- attitude control: action = [roll, pitch, yaw, collective_thrust]

[env.track]
randomize = false

[[env.track.gates]]
pos = [0.5 , 0.25, 0.7]
rpy = [0.0, 0.0, -0.78]
[[env.track.gates]]
pos = [1.05, 0.75, 1.2]
rpy = [0.0, 0.0, 2.35]
[[env.track.gates]]
pos = [-1.0, -0.25, 0.7]
rpy = [0.0, 0.0, 3.14]
[[env.track.gates]]
pos = [0.0, -0.75, 1.2]
rpy = [0.0, 0.0, 0.0]

[[env.track.obstacles]]
pos = [0.0, 0.0, 0.0]

[[env.track.drones]]
pos = [-1.5, 0.75, 0.01]
rpy = [0.0, 0.0, 0.0]
vel = [0, 0, 0]
ang_vel = [0, 0, 0]

[env.track.safety_limits]
pos_limit_low = [-2.5, -1.5, -1e-3]
pos_limit_high = [2.5, 1.5, 2.0]

[env.disturbances.action]
fn = "normal"
scale = 0.001

[env.disturbances.dynamics]
fn = "uniform"
[env.disturbances.dynamics.kwargs]
minval = [-0.1, -0.1, -0.1]
maxval = [0.1, 0.1, 0.1]
